version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════
#  FilmInsight — Docker Compose
#
#  Persistent volumes
#  ──────────────────
#  movie_scripts_data  →  screenplay PDFs  (bind-mounted from host)
#  chroma_db_data      →  Chroma vector DB (survives container restarts)
#  logs_data           →  application logs (survives container restarts)
#  flowise_data        →  Flowise settings (survives container restarts)
#
#  NOTE: movie_scripts/ and chroma_db/ are NEVER committed to Git.
#        Place screenplay PDFs in ./movie_scripts/ on the host before
#        starting the stack for the first time.
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── Flowise ──────────────────────────────────────────────────────────────
  flowise:
    image: flowiseai/flowise:latest
    container_name: filminsight-flowise
    restart: always
    ports:
      - "9000:3000"
    environment:
      - FLOWISE_USERNAME=${FLOWISE_USERNAME:-admin}
      - FLOWISE_PASSWORD=${FLOWISE_PASSWORD:-filminsight2025}
      - DATABASE_TYPE=sqlite
      - APIKEY_PATH=/root/.flowise
      - SECRETKEY_PATH=/root/.flowise
    volumes:
      - flowise_data:/root/.flowise
    networks:
      - filminsight
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── ChromaDB (standalone server — optional) ───────────────────────────────
  # The backend also uses a local PersistentClient via the chroma_db volume.
  # Keep this service if you want to expose Chroma over HTTP for Flowise.
  chromadb:
    image: chromadb/chroma:latest
    container_name: filminsight-chroma
    restart: always
    ports:
      - "8001:8000"
    volumes:
      # Shared volume: same data seen by the backend's PersistentClient
      - chroma_db_data:/chroma/chroma
    networks:
      - filminsight
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: filminsight-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - FLOWISE_URL=http://flowise:3000
      - FLOWISE_CHATFLOW_ID=${FLOWISE_CHATFLOW_ID}
      - FLOWISE_API_KEY=${FLOWISE_API_KEY:-}
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5000","http://host.docker.internal:5000"]
      # ── Ingestion / KB paths (must match volume mount-points below) ────────
      - PROJECT_ROOT=/app
      - MOVIE_SCRIPTS_DIR=/data/movie_scripts
      - CHROMA_DB_DIR=/data/chroma_db
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-filminsight_scripts}
      # ── Optional API keys for metadata fetching ────────────────────────────
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - OMDB_API_KEY=${OMDB_API_KEY:-}
    volumes:
      # ── Persistent data volumes ────────────────────────────────────────────
      # movie_scripts: read-only in the backend (ingestion writes too, so rw)
      - movie_scripts_data:/data/movie_scripts
      # chroma_db: read-write (ingestion creates / backend reads)
      - chroma_db_data:/data/chroma_db
      # logs: persistent across restarts
      - logs_data:/data/logs
    depends_on:
      flowise:
        condition: service_healthy
    networks:
      - filminsight
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # extended: allows time for auto-ingestion on first boot

  # ── React Frontend (Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: filminsight-frontend
    restart: always
    ports:
      - "5000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - filminsight
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ══════════════════════════════════════════════════════════════════════════
#  Named Volumes
#  ─────────────────────────────────────────────────────────────────────────
#  All data volumes use the local driver so Docker manages the paths.
#  On Oracle Cloud / any Linux host this resolves to:
#    /var/lib/docker/volumes/<project>_<name>/_data
#
#  To pre-seed movie_scripts, copy PDFs to the host path BEFORE first
#  docker compose up, or mount the host directory with a bind mount:
#
#  movie_scripts_data:
#    driver: local
#    driver_opts:
#      type: none
#      o: bind
#      device: /opt/filminsight/movie_scripts
# ══════════════════════════════════════════════════════════════════════════
volumes:
  flowise_data:
    driver: local
  movie_scripts_data:
    driver: local
  chroma_db_data:
    driver: local
  logs_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  filminsight:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
