version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════
#  FilmInsight — Docker Compose
#
#  Persistent volumes
#  ──────────────────
#  movie_scripts_data  →  screenplay PDFs  (bind-mounted from host)
#  chroma_db_data      →  Chroma vector DB (survives container restarts)
#  logs_data           →  application logs (survives container restarts)
#
#  NOTE: movie_scripts/ and chroma_db/ are NEVER committed to Git.
#        Place screenplay PDFs in ./movie_scripts/ on the host before
#        starting the stack for the first time.
#
#  Flowise has been removed from this stack.
#  Ingestion is now fully local:
#    PDF → PyMuPDF → RecursiveCharacterTextSplitter
#        → HuggingFace all-MiniLM-L6-v2 → Chroma → PostgreSQL
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── ChromaDB (standalone server — optional) ───────────────────────────────
  # The backend uses a PersistentClient via the chroma_db volume directly.
  # This service exposes Chroma over HTTP if you need external access.
  chromadb:
    image: chromadb/chroma:latest
    container_name: filminsight-chroma
    restart: always
    ports:
      - "8001:8000"
    volumes:
      # Shared volume: same data seen by the backend's PersistentClient
      - chroma_db_data:/chroma/chroma
    networks:
      - filminsight
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: filminsight-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # ── Groq LLM ─────────────────────────────────────────────────────────
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      # ── HuggingFace Embeddings ────────────────────────────────────────────
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-cpu}
      # ── Ingestion / KB paths (must match volume mount-points below) ────────
      - PROJECT_ROOT=/app
      - MOVIE_SCRIPTS_DIR=/data/movie_scripts
      - CHROMA_DB_DIR=/data/chroma_db
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-filminsight_scripts}
      - CHUNK_SIZE=${CHUNK_SIZE:-800}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-150}
      # ── CORS ──────────────────────────────────────────────────────────────
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5000","http://host.docker.internal:5000"]
      # ── Database & Supabase ───────────────────────────────────────────────
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY:-my-super-secret-jwt-key-replace-in-production}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # ── Optional API keys for metadata fetching ────────────────────────────
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - OMDB_API_KEY=${OMDB_API_KEY:-}
    volumes:
      # ── Persistent data volumes ────────────────────────────────────────────
      - movie_scripts_data:/data/movie_scripts
      - chroma_db_data:/data/chroma_db
      - logs_data:/data/logs
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - filminsight
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s   # extended: allows time for model download + auto-ingestion on first boot

  # ── React Frontend (Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: filminsight-frontend
    restart: always
    ports:
      - "5000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - filminsight
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ══════════════════════════════════════════════════════════════════════════
#  Named Volumes
# ══════════════════════════════════════════════════════════════════════════
volumes:
  movie_scripts_data:
    driver: local
  chroma_db_data:
    driver: local
  logs_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  filminsight:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
