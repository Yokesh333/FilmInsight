server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/ → Flowise management API on port 9000
    # host.docker.internal resolves to the Docker host on Linux when
    # the container is started with --add-host=host.docker.internal:host-gateway
    location /api/ {
        proxy_pass         http://host.docker.internal:9000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Flowise v2 Identity Manager requires Basic auth on all management API
        # endpoints. This header is added transparently — the frontend JS never
        # needs to know about credentials.
        # Value = base64("admin:filminsight2025")
        proxy_set_header   Authorization     "Basic YWRtaW46ZmlsbWluc2lnaHQyMDI1";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
